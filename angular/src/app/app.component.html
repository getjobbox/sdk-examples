<div class="app-shell">
  <header class="site-nav">
    <div class="site-nav-inner">
      <a class="brand" routerLink="/" (click)="closeMenu()">JobFinder</a>

      <button
        type="button"
        class="nav-toggle"
        [attr.aria-expanded]="menuOpen() ? 'true' : 'false'"
        aria-controls="site-nav-links"
        (click)="toggleMenu()"
      >
        <span class="sr-only">{{ menuOpen() ? 'Close menu' : 'Open menu' }}</span>
        <span class="nav-toggle-bars" aria-hidden="true"></span>
      </button>

      <nav
        id="site-nav-links"
        class="nav-links"
        [class.open]="menuOpen()"
        aria-label="Primary"
      >
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link" (click)="closeMenu()">
          All Jobs
        </a>
        <a routerLink="/hr" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
          HR Jobs
        </a>
      </nav>
    </div>
  </header>

  <main class="app-main">
    <router-outlet />
  </main>

  <footer class="site-footer">
    <a
      class="powered-by"
      href="https://getjobbox.com"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span class="powered-by-label">Powered by</span>
      <img
        class="powered-by-logo"
        src="/brand/icon.webp"
        alt="JobBox"
        width="28"
        height="28"
      />
      <span class="powered-by-name">JobBox</span>
    </a>
  </footer>
</div>
